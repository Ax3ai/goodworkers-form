<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoodWorkers Equipment LTD.</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #1c1c1e;
    color: #fff;
    padding: 24px;
    text-align: center;
    -webkit-font-smoothing: antialiased;
  }
  h1 {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .accent { color: #F26522; }
  p {
    font-size: 16px;
    color: #8e8e93;
    margin-bottom: 40px;
    max-width: 400px;
  }
  .btn {
    display: inline-block;
    background: #F26522;
    color: #fff;
    padding: 16px 40px;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 600;
    text-decoration: none;
    font-family: inherit;
    transition: transform 0.1s, opacity 0.15s;
  }
  .btn:active { transform: scale(0.97); opacity: 0.9; }
  .footer {
    position: fixed;
    bottom: 24px;
    font-size: 12px;
    color: #48484a;
  }
</style>
</head>
<body>
  <h1>Good<span class="accent">Workers</span></h1>
  <p>Labour supply solutions for the construction industry in the GTA.</p>
  <a href="/form" class="btn">Employee Registration Form</a>
  <div class="footer">GoodWorkers Equipment LTD. &mdash; Caledon, Ontario</div>
</body>
</html>
